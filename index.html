        @layer utilities {
            /* Hiệu ứng chữ 3D phát sáng viền */
            .text-glow {
                text-shadow: 0 0 5px #fff, 0 0 10px #00ffff, 0 0 15px #00ffff, 0 0 20px #00ffff;

            }
            .text-3d-custom {

                transform: perspective(500px) rotateX(5deg);
            }
            .border-glow {
                box-shadow: 0 0 8px #fff, 0 0 15px #00ffff, inset 0 0 8px rgba(0,255,255,0.3);
                animation: borderPulse 3s infinite alternate;
            }
            .btn-hover {

            }
            .btn-hover:hover {
                transform: translateY(-3px) scale(1.02);
                box-shadow: 0 0 15px #ff00ff, 0 0 25px #ff00ff;
            }
            @keyframes textPulse {
                0% { opacity: 0.8; text-shadow: 0 0 5px #fff, 0 0 10px #00ffff, 0 0 15px #00ffff; }
                100% { opacity: 1; text-shadow: 0 0 8px #fff, 0 0 15px #00ffff, 0 0 25px #00ffff, 0 0 35px #00ffff; }
            }
            @keyframes borderPulse {
                0% { box-shadow: 0 0 8px #fff, 0 0 15px #00ffff, inset 0 0 8px rgba(0,255,255,0.3); }
                100% { box-shadow: 0 0 12px #fff, 0 0 25px #00ffff, inset 0 0 12px rgba(0,255,255,0.5); }
            }
            @keyframes loadBar {
                0% { width: 0%; }
                100% { width: 100%; }
            }
            .load-animate {
                animation: loadBar 4s ease-out forwards;
            }
            .bg-custom {
                background: linear-gradient(135deg, #0a0a1a, #1a0a2a, #0a1a2a);
                background-size: 400% 400%;
                animation: bgMove 15s ease infinite;
            }
            @keyframes bgMove {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }
        }
    </style>

    <script>
        // Điều khiển màn chào và tải
        setTimeout(() => {
            document.getElementById('welcomeScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcomeScreen').classList.add('hidden');
                document.getElementById('loadingScreen').classList.remove('hidden');
                
                // Đếm phần trăm tải
                let percent = 0;
                const interval = setInterval(() => {
                    percent++;
                    document.getElementById('loadPercent').textContent = percent + '%';
                    if(percent >= 100) {
                        clearInterval(interval);
                        setTimeout(() => {
                            document.getElementById('loadingScreen').classList.add('hidden');
                            document.getElementById('mainContent').classList.remove('hidden');
                            // Phát nhạc sau khi trang tải xong
                            document.getElementById('bgMusic').play().catch(() => {});
                        }, 500);
                    }
                }, 40);
            }, 500);
        }, 5000);

        // Ẩn/hiện menu
        function toggleMenu(id) {
            const menu = document.getElementById(id);
            // Đóng các menu khác
            document.querySelectorAll('#menuSanPham, #menuGia, #menuAdmin').forEach(el => {
                if(el.id !== id) el.classList.add('hidden');
            });
            // Mở/đóng menu được chọn
            menu.classList.toggle('hidden');
        }

        // Điều khiển nhạc
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let isPlaying = true;

        musicBtn.addEventListener('click', () => {
            if(isPlaying) {
                music.pause();
                musicBtn.innerHTML = '<i class="fa fa-volume-off"></i>';
            } else {
                music.play();
                musicBtn.innerHTML = '<i class="fa fa-volume-up"></i>';
            }
            isPlaying = !isPlaying;
        });

        // Bật nhạc khi người dùng chạm vào màn hình lần đầu (tránh chặn tự động trên iOS)
        document.addEventListener('touchstart', () => {
            if(music.paused) music.play().catch(() => {});
        }, { once: true });
    </script>
