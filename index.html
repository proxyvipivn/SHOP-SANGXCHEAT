*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;background:#05050a;color:#fff;font-family:Arial,sans-serif;position:relative}

/* ========== NỀN HẠT BẰNG CSS - KHÔNG BAO GIỜ ĐÈ NỘI DUNG ========== */
.hat{position:fixed;inset:0;z-index:0;overflow:hidden;background:#05050a}
.hat span{position:absolute;width:3px;height:3px;background:#00e1ff;box-shadow:0 0 6px #00e1ff;border-radius:50%;animation:bay 12s linear infinite;opacity:.7}
@keyframes bay{
0%{transform:translateY(110vh) rotate(0);opacity:0}
10%{opacity:.8}
90%{opacity:.8}
100%{transform:translateY(-110vh) rotate(720deg);opacity:0}
}

/* ========== LOADING 0%→100% ========== */
#load{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center}
#load.an{opacity:0;visibility:hidden;transition:.6s}
#load .t1{font-size:22px;font-weight:900;background:linear-gradient(90deg,#00e1ff,#ff2bd6,#ffe600);-webkit-background-clip:text;background-clip:text;color:transparent;background-size:300% 100%;animation:mau 3s linear infinite}
#pt{font-size:55px;font-weight:900;margin:6px 0}
.bar{width:75%;max-width:360px;height:6px;background:#1a1a2e;border-radius:99px;overflow:hidden}
.bar>div{height:100%;width:0%;background:linear-gradient(90deg,#06ffa7,#00d4ff,#ff3bd4)}
@keyframes mau{to{background-position:300% 0}}

/* ========== CHỮ PHÁT SÁNH 3D ========== */
.chu{
font-weight:900;letter-spacing:1.5px;display:inline-block;
background:linear-gradient(135deg,#fff,#7df9ff,#ff79e0,#fff2a8);
background-size:200% 200%;-webkit-background-clip:text;background-clip:text;color:transparent;
animation:mau 4s linear infinite;
text-shadow:0 0 5px #7df9ffcc,0 0 12px #ff79e099,0 0 22px #00e1ff80,0 2px 0 #000,0 3px 6px #000a;
transform:perspective(600px) rotateX(6deg)
}
.vien{position:relative;border:1px solid #7df9ff44;background:rgba(8,10,22,.55);backdrop-filter:blur(8px);border-radius:14px}
.vien::before{content:"";position:absolute;inset:-2px;background:conic-gradient(from 0,#00e1ff,#ff2bd6,#ffe600,#06ffa7,#00e1ff);animation:mau 5s linear infinite;z-index:-1;filter:blur(8px);opacity:.6;border-radius:14px}
.nut{background:linear-gradient(135deg,#00c6ff,#8a2be2);box-shadow:0 0 16px #00c6ff88;padding:12px 30px;border-radius:12px;font-weight:900;border:none;color:#fff;font-size:18px;cursor:pointer}
.nut:hover{transform:translateY(-2px)}

/* ========== NỘI DUNG LUÔN Ở TRÊN CÙNG ========== */
#main{position:relative;z-index:10;padding:18px 12px;max-width:720px;margin:0 auto;text-align:center}
.ds{margin-top:14px;display:grid;gap:8px;grid-template-columns:1fr 1fr}
.ds.an{display:none}
.sp{padding:10px;cursor:pointer;text-align:left}
.sp.full{grid-column:1/-1;text-align:center}

.modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:12px}
.modal.hien{display:flex}
.box{width:100%;max-width:440px;padding:14px;font-size:14px;text-align:left;animation:len .3s}
@keyframes len{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
a{color:#7df9ff;text-decoration:none}

.nhac{position:fixed;right:10px;bottom:10px;z-index:50;padding:8px 10px;display:flex;align-items:center;gap:8px}
.bt{width:32px;height:32px;border-radius:50%;border:none;background:linear-gradient(135deg,#00c6ff,#8a2be2);color:#fff;cursor:pointer}
